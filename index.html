<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Super 8 — Padel</title>
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700&family=Barlow+Condensed:wght@600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green: #1D9E75;
      --green-dark: #0F6E56;
      --green-light: rgba(29,158,117,0.10);
      --bg: #f0eeea;
      --surface: #ffffff;
      --surface2: #e8e6e1;
      --border: rgba(0,0,0,0.09);
      --border2: rgba(0,0,0,0.16);
      --text: #1a1a18;
      --text2: #5f5e5a;
      --text3: #999890;
      --gold: #BA7517;
      --silver: #7a7975;
      --bronze: #903820;
      --radius: 10px;
      --radius-sm: 6px;
      --font: 'Barlow', sans-serif;
      --font-cond: 'Barlow Condensed', sans-serif;
    }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 2rem 1rem 5rem;
    }

    .container { max-width: 720px; margin: 0 auto; }

    header {
      text-align: center;
      margin-bottom: 2rem;
      padding-bottom: 1.5rem;
      border-bottom: 0.5px solid var(--border2);
    }
    header h1 {
      font-family: var(--font-cond);
      font-size: 38px;
      font-weight: 700;
      letter-spacing: 1px;
      color: var(--text);
      text-transform: uppercase;
    }
    header h1 span { color: var(--green); }
    header p { font-size: 14px; color: var(--text3); margin-top: 4px; }

    .card {
      background: var(--surface);
      border: 0.5px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      margin-bottom: 1rem;
    }

    .card-header {
      background: var(--surface2);
      padding: 9px 16px;
      border-bottom: 0.5px solid var(--border);
      font-family: var(--font-cond);
      font-size: 13px;
      font-weight: 700;
      color: var(--text2);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .player-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      padding: 16px;
    }
    @media (max-width: 500px) { .player-grid { grid-template-columns: repeat(2, 1fr); } }

    .player-input-wrap { display: flex; flex-direction: column; gap: 4px; }
    .player-label { font-size: 11px; color: var(--text3); font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; }
    .player-input {
      width: 100%;
      font-family: var(--font);
      font-size: 13px;
      padding: 7px 9px;
      border: 0.5px solid var(--border2);
      border-radius: var(--radius-sm);
      background: var(--surface);
      color: var(--text);
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .player-input:focus { outline: none; border-color: var(--green); box-shadow: 0 0 0 3px rgba(29,158,117,0.12); }

    .btn-row { display: flex; gap: 10px; margin-bottom: 1.5rem; }

    .btn-generate {
      flex: 1;
      padding: 12px;
      background: var(--green);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      font-family: var(--font-cond);
      font-size: 16px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
    }
    .btn-generate:hover { background: var(--green-dark); }
    .btn-generate:active { transform: scale(0.99); }

    .btn-reset {
      padding: 12px 20px;
      background: transparent;
      color: var(--text3);
      border: 0.5px solid var(--border2);
      border-radius: var(--radius);
      font-family: var(--font-cond);
      font-size: 14px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      cursor: pointer;
      transition: all 0.15s;
    }
    .btn-reset:hover { border-color: #c0392b; color: #c0392b; background: rgba(192,57,43,0.05); }

    .btn-pdf {
      padding: 12px 20px;
      background: transparent;
      color: var(--text2);
      border: 0.5px solid var(--border2);
      border-radius: var(--radius);
      font-family: var(--font-cond);
      font-size: 14px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      cursor: pointer;
      transition: all 0.15s;
    }
    .btn-pdf:hover { border-color: var(--green); color: var(--green); background: rgba(29,158,117,0.05); }

    @media print {
      body { background: #fff; padding: 0; }
      .no-print { display: none !important; }
      .card, .standings-card { box-shadow: none; border: 1px solid #ddd; break-inside: avoid; }
      .rounds-container { gap: 8px; }
      .section-gap { margin-top: 1rem; }
    }

    .rounds-container { display: flex; flex-direction: column; gap: 12px; }

    .court-row {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      padding: 11px 16px;
      gap: 12px;
      border-bottom: 0.5px solid var(--border);
    }
    .court-row:last-child { border-bottom: none; }

    .team { display: flex; flex-direction: column; gap: 3px; }
    .team.right { align-items: flex-end; text-align: right; }
    .player-name { font-size: 13px; font-weight: 600; color: var(--text); }

    .vs-block { display: flex; flex-direction: column; align-items: center; gap: 5px; }
    .court-badge {
      font-size: 10px;
      font-weight: 700;
      color: var(--text3);
      background: var(--surface2);
      border: 0.5px solid var(--border);
      border-radius: 4px;
      padding: 2px 7px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .vs-text { font-size: 10px; font-weight: 700; color: var(--text3); letter-spacing: 0.05em; }

    .score-inputs { display: flex; align-items: center; gap: 5px; }
    .score-input {
      width: 40px;
      text-align: center;
      font-family: var(--font-cond);
      font-size: 18px;
      font-weight: 700;
      padding: 5px 4px;
      border: 0.5px solid var(--border2);
      border-radius: var(--radius-sm);
      background: var(--surface);
      color: var(--text);
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .score-input:focus { outline: none; border-color: var(--green); box-shadow: 0 0 0 3px rgba(29,158,117,0.12); }
    .score-sep { font-size: 14px; color: var(--text3); font-weight: 600; }

    /* Tabela de games por rodada */
    .games-table-wrap { overflow-x: auto; padding: 0; }
    .games-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    .games-table th {
      background: var(--surface2);
      padding: 8px 10px;
      font-family: var(--font-cond);
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text2);
      border-bottom: 0.5px solid var(--border);
      white-space: nowrap;
    }
    .games-table th:first-child { text-align: left; min-width: 110px; }
    .games-table th:not(:first-child) { text-align: center; min-width: 52px; }
    .games-table td {
      padding: 9px 10px;
      border-bottom: 0.5px solid var(--border);
      color: var(--text);
    }
    .games-table td:first-child { font-weight: 600; font-size: 13px; }
    .games-table td:not(:first-child) { text-align: center; font-size: 13px; }
    .games-table tr:last-child td { border-bottom: none; }
    .games-table tr:hover td { background: rgba(29,158,117,0.04); }
    .games-table .total-cell {
      font-family: var(--font-cond);
      font-size: 16px;
      font-weight: 700;
      color: var(--green);
    }
    .games-table .no-game { color: var(--text3); font-size: 11px; }

    /* Classificação */
    .standings-card {
      background: var(--surface);
      border: 0.5px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      margin-top: 1rem;
    }

    .standing-row {
      display: grid;
      grid-template-columns: 32px 1fr auto;
      align-items: center;
      padding: 11px 16px;
      gap: 12px;
      border-bottom: 0.5px solid var(--border);
    }
    .standing-row:last-child { border-bottom: none; }
    .standing-row.top1 { background: rgba(186,117,23,0.07); }
    .standing-row.top2 { background: rgba(122,121,117,0.06); }
    .standing-row.top3 { background: rgba(144,56,32,0.06); }

    .pos { font-family: var(--font-cond); font-size: 14px; font-weight: 700; color: var(--text3); }
    .pos.gold { color: var(--gold); }
    .pos.silver { color: var(--silver); }
    .pos.bronze { color: var(--bronze); }

    .standing-info { display: flex; flex-direction: column; gap: 2px; }
    .standing-name { font-size: 14px; font-weight: 600; color: var(--text); }
    .standing-criteria { font-size: 11px; color: var(--text3); font-style: italic; }

    .standing-right { display: flex; flex-direction: column; align-items: flex-end; gap: 2px; }
    .games-val { font-family: var(--font-cond); font-size: 22px; font-weight: 700; color: var(--green); line-height: 1; }
    .games-lbl { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.04em; }

    .section-gap { margin-top: 1.5rem; }
  </style>
</head>
<body>
<div class="container">

  




  <header style="display:flex;align-items:center;gap:1.2rem;text-align:left;margin-bottom:2rem;padding-bottom:1.5rem;border-bottom:0.5px solid rgba(0,0,0,0.16);">
    <div>
      <h1 style="font-family:'Barlow Condensed',sans-serif;font-size:38px;font-weight:700;letter-spacing:1px;color:#1a1a18;text-transform:uppercase;line-height:1;">Super 8 <span style="color:#1D9E75;">Padel</span></h1>
      <p style="font-size:14px;color:#999890;margin-top:2px;">Preencha os jogadores, gere a tabela e registre os placares</p>
    </div>
  </header>

  <div class="card no-print">
    <div class="card-header">Jogadores</div>
    <div class="player-grid" id="player-grid"></div>
  </div>

  <div class="btn-row no-print">
    <button class="btn-generate" onclick="generateTournament()">Gerar tabela de jogos</button>
    <button class="btn-reset" onclick="resetAll()">↺ Resetar tudo</button>
    <button class="btn-pdf" onclick="exportPDF()" id="btn-pdf" style="display:none;">⬇ PDF</button>
  </div>

  <div id="rounds-section"></div>
  <div id="games-table-section" class="section-gap"></div>
  <div id="standings-section" class="section-gap"></div>

</div>

<script>
const ROUNDS = [
  [{a:[0,1],b:[2,3]},{a:[4,5],b:[6,7]}],
  [{a:[0,2],b:[4,6]},{a:[1,3],b:[5,7]}],
  [{a:[0,3],b:[5,6]},{a:[1,2],b:[4,7]}],
  [{a:[0,4],b:[3,6]},{a:[1,5],b:[2,7]}],
  [{a:[0,5],b:[2,6]},{a:[1,4],b:[3,7]}],
  [{a:[0,6],b:[1,7]},{a:[2,5],b:[3,4]}],
  [{a:[0,7],b:[2,4]},{a:[1,6],b:[3,5]}],
];

const STORAGE_KEY = 'super8_padel_data';

let scores = {};
let generated = false;

function saveToStorage() {
  const names = Array.from({length:8}, (_,i) => document.getElementById('p'+i)?.value || `Jogador ${i+1}`);
  localStorage.setItem(STORAGE_KEY, JSON.stringify({ names, scores, generated }));
}

function loadFromStorage() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return null;
    return JSON.parse(raw);
  } catch(e) { return null; }
}

function buildPlayerGrid(savedNames) {
  const g = document.getElementById('player-grid');
  g.innerHTML = '';
  for (let i = 0; i < 8; i++) {
    const wrap = document.createElement('div');
    wrap.className = 'player-input-wrap';
    const val = savedNames ? savedNames[i] : `Jogador ${i+1}`;
    wrap.innerHTML = `
      <span class="player-label">Jogador ${i+1}</span>
      <input class="player-input" id="p${i}" type="text" value="${val}" maxlength="18" oninput="saveToStorage()" />
    `;
    g.appendChild(wrap);
  }
}

function getNames() {
  return Array.from({length:8}, (_,i) => document.getElementById('p'+i)?.value.trim() || `Jogador ${i+1}`);
}

function generateTournament(savedScores) {
  generated = true;
  if (!savedScores) scores = {};
  const names = getNames();
  const sec = document.getElementById('rounds-section');
  sec.innerHTML = '';

  const container = document.createElement('div');
  container.className = 'rounds-container';

  ROUNDS.forEach((courts, ri) => {
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `<div class="card-header">Rodada ${ri+1}</div>`;

    courts.forEach((match, ci) => {
      const key = `${ri}-${ci}`;
      if (!savedScores) scores[key] = {a:'', b:'', match};
      else if (!scores[key]) scores[key] = {a:'', b:'', match};
      else scores[key].match = match;

      const row = document.createElement('div');
      row.className = 'court-row';
      const va = scores[key].a !== '' ? scores[key].a : '';
      const vb = scores[key].b !== '' ? scores[key].b : '';
      row.innerHTML = `
        <div class="team">
          <span class="player-name">${names[match.a[0]]}</span>
          <span class="player-name">${names[match.a[1]]}</span>
        </div>
        <div class="vs-block">
          <span class="court-badge">Quadra ${ci+1}</span>
          <span class="vs-text">vs</span>
          <div class="score-inputs">
            <input class="score-input" type="number" min="0" max="99" placeholder="–" id="s${key}a" value="${va}"
              oninput="updateScore('${key}','a',this.value)" />
            <span class="score-sep">×</span>
            <input class="score-input" type="number" min="0" max="99" placeholder="–" id="s${key}b" value="${vb}"
              oninput="updateScore('${key}','b',this.value)" />
          </div>
        </div>
        <div class="team right">
          <span class="player-name">${names[match.b[0]]}</span>
          <span class="player-name">${names[match.b[1]]}</span>
        </div>
      `;
      card.appendChild(row);
    });

    container.appendChild(card);
  });

  sec.appendChild(container);
  renderGamesTable();
  renderStandings();
  showPdfBtn();
  saveToStorage();
}

function updateScore(key, side, val) {
  scores[key][side] = val === '' ? '' : Math.max(0, parseInt(val) || 0);
  renderGamesTable();
  renderStandings();
  saveToStorage();
}

function getPlayerGamesByRound() {
  const gamesPerRound = Array.from({length:8}, () => Array(7).fill(null));
  const wins = new Array(8).fill(0);

  ROUNDS.forEach((courts, ri) => {
    courts.forEach((match, ci) => {
      const key = `${ri}-${ci}`;
      const s = scores[key];
      if (!s) return;
      const na = s.a !== '' ? parseInt(s.a) : null;
      const nb = s.b !== '' ? parseInt(s.b) : null;
      if (na === null || nb === null || isNaN(na) || isNaN(nb)) return;

      match.a.forEach(p => { gamesPerRound[p][ri] = (gamesPerRound[p][ri] || 0) + na; });
      match.b.forEach(p => { gamesPerRound[p][ri] = (gamesPerRound[p][ri] || 0) + nb; });

      if (na > nb) { match.a.forEach(p => wins[p]++); }
      else if (nb > na) { match.b.forEach(p => wins[p]++); }
    });
  });

  return { gamesPerRound, wins };
}

function getDirectResult(pA, pB) {
  for (let ri = 0; ri < ROUNDS.length; ri++) {
    for (let ci = 0; ci < ROUNDS[ri].length; ci++) {
      const match = ROUNDS[ri][ci];
      const aInA = match.a.includes(pA), bInA = match.a.includes(pB);
      const aInB = match.b.includes(pA), bInB = match.b.includes(pB);
      // jogaram em lados opostos?
      if ((aInA && bInB) || (aInB && bInA)) {
        const key = `${ri}-${ci}`;
        const s = scores[key];
        if (!s) continue;
        const na = s.a !== '' ? parseInt(s.a) : null;
        const nb = s.b !== '' ? parseInt(s.b) : null;
        if (na === null || nb === null || isNaN(na) || isNaN(nb)) continue;
        // pA estava no lado A?
        if (aInA && bInB) return na > nb ? pA : nb > na ? pB : null;
        if (aInB && bInA) return nb > na ? pA : na > nb ? pB : null;
      }
    }
  }
  return null;
}

function renderGamesTable() {
  const names = getNames();
  const { gamesPerRound } = getPlayerGamesByRound();
  const sec = document.getElementById('games-table-section');

  const card = document.createElement('div');
  card.className = 'card';
  card.innerHTML = `<div class="card-header">Games ganhos por rodada</div>`;

  const wrap = document.createElement('div');
  wrap.className = 'games-table-wrap';

  let thead = `<thead><tr><th>Jogador</th>`;
  for (let r = 1; r <= 7; r++) thead += `<th>J${r}</th>`;
  thead += `<th>Total</th></tr></thead>`;

  let tbody = `<tbody>`;
  for (let i = 0; i < 8; i++) {
    const total = gamesPerRound[i].reduce((s, v) => s + (v !== null ? v : 0), 0);
    tbody += `<tr><td>${names[i]}</td>`;
    for (let r = 0; r < 7; r++) {
      const v = gamesPerRound[i][r];
      tbody += v !== null ? `<td>${v}</td>` : `<td class="no-game">–</td>`;
    }
    tbody += `<td class="total-cell">${total}</td></tr>`;
  }
  tbody += `</tbody>`;

  const table = document.createElement('table');
  table.className = 'games-table';
  table.innerHTML = thead + tbody;
  wrap.appendChild(table);
  card.appendChild(wrap);

  sec.innerHTML = '';
  sec.appendChild(card);
}

function renderStandings() {
  const names = getNames();
  const { gamesPerRound, wins } = getPlayerGamesByRound();

  const totals = gamesPerRound.map(rounds => rounds.reduce((s, v) => s + (v !== null ? v : 0), 0));

  const players = totals.map((g, i) => ({ i, name: names[i], games: g, wins: wins[i] }));

  players.sort((a, b) => {
    if (b.games !== a.games) return b.games - a.games;
    if (b.wins !== a.wins) return b.wins - a.wins;
    // confronto direto
    const winner = getDirectResult(a.i, b.i);
    if (winner === a.i) return -1;
    if (winner === b.i) return 1;
    return 0;
  });

  // determinar critério usado para cada posição
  function getCriteria(pos) {
    if (pos === 0) return null;
    const curr = players[pos];
    const prev = players[pos - 1];
    if (curr.games !== prev.games) return null;
    if (curr.wins !== prev.wins) return '1° critério: partidas vencidas';
    const winner = getDirectResult(curr.i, prev.i);
    if (winner !== null) return '2° critério: confronto direto';
    return null;
  }

  const sec = document.getElementById('standings-section');
  const card = document.createElement('div');
  card.className = 'standings-card';
  card.innerHTML = `<div class="card-header"><span>Classificação final</span><span style="font-size:11px;font-weight:400;color:var(--text3);">games ganhos</span></div>`;

  players.forEach((p, pos) => {
    const row = document.createElement('div');
    const topClass = pos === 0 ? 'top1' : pos === 1 ? 'top2' : pos === 2 ? 'top3' : '';
    row.className = 'standing-row ' + topClass;
    const posClass = pos === 0 ? 'gold' : pos === 1 ? 'silver' : pos === 2 ? 'bronze' : '';
    const medal = pos === 0 ? '1°' : pos === 1 ? '2°' : pos === 2 ? '3°' : `${pos+1}°`;
    const criteria = getCriteria(pos);
    const isChamp = pos === 0;

    row.innerHTML = `
      <span class="pos ${posClass}">${medal}</span>
      <div class="standing-info">
        ${isChamp ? `<span style="font-size:10px;font-weight:700;letter-spacing:0.1em;color:#BA7517;text-transform:uppercase;margin-bottom:2px;display:block;">&#9733; Campeão</span>` : ''}
        <span class="standing-name" style="${isChamp ? 'font-size:16px;' : ''}">${p.name}</span>
        ${criteria ? `<span class="standing-criteria">${criteria}</span>` : ''}
      </div>
      <div class="standing-right">
        <span class="games-val">${p.games}</span>
        <span class="games-lbl">games</span>
      </div>
    `;
    card.appendChild(row);
  });

  sec.innerHTML = '';
  sec.appendChild(card);
}

function exportPDF() {
  window.print();
}

function showPdfBtn() {
  const btn = document.getElementById('btn-pdf');
  if (btn) btn.style.display = '';
}

function resetAll() {
  if (!confirm('Tem certeza que deseja apagar todos os dados?')) return;
  localStorage.removeItem(STORAGE_KEY);
  scores = {};
  generated = false;
  buildPlayerGrid(null);
  document.getElementById('rounds-section').innerHTML = '';
  document.getElementById('games-table-section').innerHTML = '';
  document.getElementById('standings-section').innerHTML = '';
  const btn = document.getElementById('btn-pdf');
  if (btn) btn.style.display = 'none';
}

// Init
(function init() {
  const saved = loadFromStorage();
  if (saved) {
    buildPlayerGrid(saved.names);
    if (saved.generated && saved.scores) {
      scores = saved.scores;
      // restore match objects
      ROUNDS.forEach((courts, ri) => {
        courts.forEach((match, ci) => {
          const key = `${ri}-${ci}`;
          if (scores[key]) scores[key].match = match;
        });
      });
      generateTournament(true);
    }
  } else {
    buildPlayerGrid(null);
  }
})();
