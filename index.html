<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Super 8 — Padel</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700&family=Barlow+Condensed:wght@600;700&family=Ubuntu:wght@300;400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <header class="site-header">
      <div>
        <h1>Super 8 <span>Padel</span></h1>
        <p>Preencha os jogadores, gere a tabela e registre os placares</p>
      </div>
    </header>

    <div class="card no-print">
      <div class="card-header">Jogadores</div>
      <div class="player-grid" id="player-grid"></div>
    </div>

    <div class="btn-row no-print">
      <button id="btn-generate" class="btn-generate">Gerar tabela de jogos</button>
      <button id="btn-reset" class="btn-reset">↺ Resetar tudo</button>
      <button id="btn-pdf" class="btn-pdf" style="display:none;">⬇ PDF</button>
    </div>

    <div id="rounds-section"></div>
    <div id="games-table-section" class="section-gap"></div>
    <div id="standings-section" class="section-gap"></div>
  </div>

  <footer class="site-footer">
    <div class="footer-author">
      <p>desenvolvido por</p>
      <div class="name-line">
        <span class="name-regular">murilo</span>
        <span class="name-bold">biscaro</span>
      </div>
      <div class="subtitle">&lt;desenvolvedorFullStack/&gt;</div>
    </div>
    <div class="footer-brand">
      <a class="footer-link" href="https://instagram.com/murilo.biscaro" target="_blank">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="5"/><circle cx="12" cy="12" r="5"/><circle cx="17.5" cy="6.5" r="1.2" fill="currentColor" stroke="none"/></svg>
        @murilo.biscaro
      </a>
    </div>
  </footer>

  <script src="script.js"></script>
</body>
</html>
