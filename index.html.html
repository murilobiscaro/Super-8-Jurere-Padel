<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Super 8 — Padel</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green: #1D9E75;
      --green-dark: #0F6E56;
      --green-light: rgba(29,158,117,0.10);
      --bg: #f5f5f2;
      --surface: #ffffff;
      --surface2: #f0efea;
      --border: rgba(0,0,0,0.10);
      --border2: rgba(0,0,0,0.18);
      --text: #1a1a18;
      --text2: #5f5e5a;
      --text3: #888780;
      --gold: #BA7517;
      --silver: #888780;
      --bronze: #993C1D;
      --radius: 10px;
      --radius-sm: 6px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 2rem 1rem 4rem;
    }

    .container { max-width: 700px; margin: 0 auto; }

    header { text-align: center; margin-bottom: 2rem; }
    header h1 { font-size: 28px; font-weight: 700; letter-spacing: -0.5px; color: var(--text); }
    header h1 span { color: var(--green); }
    header p { font-size: 14px; color: var(--text2); margin-top: 4px; }

    .card {
      background: var(--surface);
      border: 0.5px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      margin-bottom: 1rem;
    }

    .card-header {
      background: var(--surface2);
      padding: 10px 16px;
      border-bottom: 0.5px solid var(--border);
      font-size: 12px;
      font-weight: 600;
      color: var(--text2);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .player-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      padding: 16px;
    }

    @media (max-width: 480px) {
      .player-grid { grid-template-columns: repeat(2, 1fr); }
    }

    .player-input-wrap { display: flex; flex-direction: column; gap: 4px; }
    .player-label { font-size: 11px; color: var(--text3); font-weight: 500; }
    .player-input {
      width: 100%;
      font-size: 13px;
      padding: 7px 9px;
      border: 0.5px solid var(--border2);
      border-radius: var(--radius-sm);
      background: var(--surface);
      color: var(--text);
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .player-input:focus {
      outline: none;
      border-color: var(--green);
      box-shadow: 0 0 0 3px rgba(29,158,117,0.15);
    }

    .btn-generate {
      width: 100%;
      padding: 12px;
      background: var(--green);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      margin-bottom: 1.5rem;
      transition: background 0.15s, transform 0.1s;
      letter-spacing: 0.01em;
    }
    .btn-generate:hover { background: var(--green-dark); }
    .btn-generate:active { transform: scale(0.99); }

    .rounds-container { display: flex; flex-direction: column; gap: 12px; }

    .court-row {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      padding: 12px 16px;
      gap: 12px;
      border-bottom: 0.5px solid var(--border);
    }
    .court-row:last-child { border-bottom: none; }

    .team { display: flex; flex-direction: column; gap: 4px; }
    .team.right { align-items: flex-end; text-align: right; }
    .player-name { font-size: 13px; font-weight: 600; color: var(--text); }

    .vs-block { display: flex; flex-direction: column; align-items: center; gap: 5px; }
    .court-badge {
      font-size: 10px;
      color: var(--text3);
      background: var(--surface2);
      border: 0.5px solid var(--border);
      border-radius: 4px;
      padding: 2px 7px;
      white-space: nowrap;
    }
    .vs-text { font-size: 10px; font-weight: 600; color: var(--text3); }

    .score-inputs { display: flex; align-items: center; gap: 5px; }
    .score-input {
      width: 40px;
      text-align: center;
      font-size: 15px;
      font-weight: 700;
      padding: 5px 4px;
      border: 0.5px solid var(--border2);
      border-radius: var(--radius-sm);
      background: var(--surface);
      color: var(--text);
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .score-input:focus {
      outline: none;
      border-color: var(--green);
      box-shadow: 0 0 0 3px rgba(29,158,117,0.15);
    }
    .score-sep { font-size: 14px; color: var(--text3); font-weight: 500; }

    /* Standings */
    .standings-card {
      background: var(--surface);
      border: 0.5px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      margin-top: 1.5rem;
    }
    .standing-row {
      display: grid;
      grid-template-columns: 32px 1fr 60px;
      align-items: center;
      padding: 11px 16px;
      gap: 10px;
      border-bottom: 0.5px solid var(--border);
    }
    .standing-row:last-child { border-bottom: none; }
    .standing-row.top1 { background: rgba(186,117,23,0.07); }
    .standing-row.top2 { background: rgba(136,135,128,0.07); }
    .standing-row.top3 { background: rgba(153,60,29,0.06); }

    .pos { font-size: 13px; font-weight: 700; color: var(--text3); }
    .pos.gold { color: var(--gold); }
    .pos.silver { color: var(--silver); }
    .pos.bronze { color: var(--bronze); }

    .bar-wrap { display: flex; align-items: center; gap: 10px; }
    .bar-name { font-size: 13px; font-weight: 600; color: var(--text); min-width: 80px; max-width: 140px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .bar-track { flex: 1; background: var(--surface2); border-radius: 2px; height: 5px; }
    .bar-fill { height: 5px; border-radius: 2px; background: var(--green); transition: width 0.35s ease; }
    .games-val { font-size: 14px; font-weight: 700; color: var(--text); text-align: right; }

    .empty { text-align: center; padding: 2.5rem 1rem; color: var(--text3); font-size: 14px; }
  </style>
</head>
<body>
<div class="container">

  <header>
    <h1>Super 8 <span>Padel</span></h1>
    <p>Preencha os jogadores, gere a tabela e registre os placares</p>
  </header>

  <div class="card">
    <div class="card-header">Jogadores</div>
    <div class="player-grid" id="player-grid"></div>
  </div>

  <button class="btn-generate" onclick="generateTournament()">Gerar tabela de jogos</button>

  <div id="rounds-section"></div>
  <div id="standings-section"></div>

</div>

<script>
  const ROUNDS = [
    [{a:[0,1],b:[2,3]},{a:[4,5],b:[6,7]}],
    [{a:[0,2],b:[4,6]},{a:[1,3],b:[5,7]}],
    [{a:[0,3],b:[5,6]},{a:[1,2],b:[4,7]}],
    [{a:[0,4],b:[3,6]},{a:[1,5],b:[2,7]}],
    [{a:[0,5],b:[2,6]},{a:[1,4],b:[3,7]}],
    [{a:[0,6],b:[1,7]},{a:[2,5],b:[3,4]}],
    [{a:[0,7],b:[2,4]},{a:[1,6],b:[3,5]}],
  ];

  let scores = {};

  function buildPlayerGrid() {
    const g = document.getElementById('player-grid');
    g.innerHTML = '';
    for (let i = 0; i < 8; i++) {
      const wrap = document.createElement('div');
      wrap.className = 'player-input-wrap';
      wrap.innerHTML = `
        <span class="player-label">Jogador ${i+1}</span>
        <input class="player-input" id="p${i}" type="text" value="Jogador ${i+1}" maxlength="18" />
      `;
      g.appendChild(wrap);
    }
  }

  function getNames() {
    return Array.from({length:8}, (_,i) => document.getElementById('p'+i).value.trim() || `Jogador ${i+1}`);
  }

  function generateTournament() {
    scores = {};
    const names = getNames();
    const sec = document.getElementById('rounds-section');
    sec.innerHTML = '';

    const container = document.createElement('div');
    container.className = 'rounds-container';

    ROUNDS.forEach((courts, ri) => {
      const card = document.createElement('div');
      card.className = 'card';
      card.innerHTML = `<div class="card-header">Rodada ${ri+1}</div>`;

      courts.forEach((match, ci) => {
        const key = `${ri}-${ci}`;
        scores[key] = {a:'', b:'', match};

        const row = document.createElement('div');
        row.className = 'court-row';
        row.innerHTML = `
          <div class="team">
            <span class="player-name">${names[match.a[0]]}</span>
            <span class="player-name">${names[match.a[1]]}</span>
          </div>
          <div class="vs-block">
            <span class="court-badge">Quadra ${ci+1}</span>
            <span class="vs-text">vs</span>
            <div class="score-inputs">
              <input class="score-input" type="number" min="0" max="99" placeholder="–" id="s${key}a"
                oninput="updateScore('${key}','a',this.value)" />
              <span class="score-sep">×</span>
              <input class="score-input" type="number" min="0" max="99" placeholder="–" id="s${key}b"
                oninput="updateScore('${key}','b',this.value)" />
            </div>
          </div>
          <div class="team right">
            <span class="player-name">${names[match.b[0]]}</span>
            <span class="player-name">${names[match.b[1]]}</span>
          </div>
        `;
        card.appendChild(row);
      });

      container.appendChild(card);
    });

    sec.appendChild(container);
    renderStandings();
  }

  function updateScore(key, side, val) {
    scores[key][side] = val === '' ? '' : Math.max(0, parseInt(val) || 0);
    renderStandings();
  }

  function renderStandings() {
    const names = getNames();
    const games = new Array(8).fill(0);

    Object.values(scores).forEach(({a, b, match}) => {
      if (a === '' || b === '' || a === undefined || b === undefined) return;
      const na = parseInt(a), nb = parseInt(b);
      if (isNaN(na) || isNaN(nb)) return;
      match.a.forEach(p => { games[p] += na; });
      match.b.forEach(p => { games[p] += nb; });
    });

    const ranked = games
      .map((g, i) => ({games: g, i, name: names[i]}))
      .sort((a, b) => b.games - a.games);

    const maxGames = Math.max(...ranked.map(r => r.games), 1);

    const sec = document.getElementById('standings-section');
    const card = document.createElement('div');
    card.className = 'standings-card';
    card.innerHTML = `
      <div class="card-header">
        <span>Classificação</span>
        <span>Games ganhos</span>
      </div>
    `;

    ranked.forEach((p, pos) => {
      const row = document.createElement('div');
      const topClass = pos === 0 ? 'top1' : pos === 1 ? 'top2' : pos === 2 ? 'top3' : '';
      row.className = 'standing-row ' + topClass;
      const posClass = pos === 0 ? 'gold' : pos === 1 ? 'silver' : pos === 2 ? 'bronze' : '';
      const medal = pos === 0 ? '1°' : pos === 1 ? '2°' : pos === 2 ? '3°' : `${pos+1}°`;
      const barW = Math.round((p.games / maxGames) * 100);
      row.innerHTML = `
        <span class="pos ${posClass}">${medal}</span>
        <div class="bar-wrap">
          <span class="bar-name">${p.name}</span>
          <div class="bar-track"><div class="bar-fill" style="width:${barW}%"></div></div>
        </div>
        <span class="games-val">${p.games}</span>
      `;
      card.appendChild(row);
    });

    sec.innerHTML = '';
    sec.appendChild(card);
  }

  buildPlayerGrid();
</script>
</body>
</html>
